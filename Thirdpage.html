<!DOCTYPE html>
<html>
<head>
<title>GOTCHA!!!</title>

<style>
  body {
    background-color: black;
    color: #BCE954;
    text-align: center;
    font-family: Creepster, sans-serif;
    overflow: hidden;
  }

  .container {
    position: relative;
    display: inline-block;
  }

  .container img {
    width: 60%;
    margin-top: 20px;
  }

  #startBtn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding: 20px 30px;
    font-size: 22px;
    background: crimson;
    color: white;
    border: none;
    cursor: pointer;
    box-shadow: 0 0 20px red;
    z-index: 10;
  }

  #hiddenBtn {
    position: absolute;
    width: 80px;
    height: 80px;
    background: rgba(0,255,0,0.15);
    border: 2px dashed #BCE954;
    display: none;
    cursor: pointer;
  }

  #info {
    margin-top: 15px;
    font-size: 18px;
  }
</style>
</head>

<body>

<h1>GOTCHA!!!</h1>

<div class="container">
  <img src="Crawling through shadows of horror.png">

  <button id="startBtn" onclick="startGame()">▶ START</button>
</div>

<p id="info">Find the hidden box before time runs out!</p>

<div id="hiddenBtn"></div>

<script>
let gameActive = false;
let timer;
let timeLeft = 6;

// start game
function startGame() {
  gameActive = true;
  document.getElementById("startBtn").style.display = "none";

  document.getElementById("hiddenBtn").style.display = "block";

  moveButton();
  startTimer();
}

// timer
function startTimer() {
  let info = document.getElementById("info");

  timer = setInterval(() => {
    timeLeft--;
    info.innerText = "Time left: " + timeLeft + "s";

    if (timeLeft <= 0) {
      clearInterval(timer);
      loseGame();
    }
  }, 1000);
}

// moving target
function moveButton() {
  if (!gameActive) return;

  let btn = document.getElementById("hiddenBtn");

  btn.style.top = Math.random() * 80 + "%";
  btn.style.left = Math.random() * 80 + "%";

  setTimeout(moveButton, 700);
}

// win
document.getElementById("hiddenBtn").onclick = function() {
  gameActive = false;
  clearInterval(timer);

  document.body.innerHTML = `
    <h1>You Escaped...</h1>
    <button onclick="location.reload()">Play Again</button>
  `;
};

// lose → jumpscare
function loseGame() {
  gameActive = false;

  document.body.innerHTML = `
    <img src="scary.jpg" style="width:100%; height:100vh;">
    <audio autoplay src="scream.mp3"></audio>
  `;
}

// flicker effect
setInterval(() => {
  document.body.style.background =
    Math.random() > 0.95 ? "#200000" : "black";
}, 120);

</script>

</body>
</html>
